name: Windows Release Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Package MSIX
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 2.11.1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Generate Rust Bridge Code
        run: flutter_rust_bridge_codegen generate

      - name: Commit Generated Code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/src/rust rust/src/frb_generated.rs
          git diff --staged --quiet || git commit -m "chore: sync generated bridge code"
          git push origin main
        continue-on-error: true # Don't fail if there are no changes or push fails

      - name: Build Windows App
        run: flutter build windows --release

      - name: Package to MSIX
        run: dart run msix:create

      - name: Upload MSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AegisVault-Windows-MSIX
          path: build/windows/x64/runner/Release/*.msix
          if-no-files-found: error
